# Example Cloudflare R2 credentials configuration
# Add this section to your Rails credentials using: EDITOR=nano rails credentials:edit

cloudflare_r2:
  access_key_id: "your_r2_access_key_id_here"
  secret_access_key: "your_r2_secret_access_key_here"
  bucket: "your-r2-bucket-name"
  endpoint: "https://your-account-id.r2.cloudflarestorage.com"
  # Replace 'your-account-id' with your actual Cloudflare account ID

# How to get these credentials:
# 1. Log in to Cloudflare Dashboard
# 2. Go to R2 Object Storage
# 3. Create a bucket if you haven't already
# 4. Go to "Manage R2 API tokens"
# 5. Create a new API token with R2 permissions
# 6. Copy the Access Key ID, Secret Access Key, and endpoint URL
# 7. Add them to Rails credentials using the structure above